name: CD

on:
  release:
    types: [published]
  workflow_run:
    workflows: ['CI']
    types: [completed]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile

      - name: Publish package
        run: npx jsr publish