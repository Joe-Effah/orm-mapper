name: Check-in

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main
jobs:
  check:
    name: Check PR (tests + package artifact)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun (action)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install
        run: bun install

      - name: Run tests
        run: bun test

      - name: Pack package artifact
        run: |
          mkdir -p dist
          bun x npm pack --silent --pack-destination dist || true

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: package-tarball
          path: dist/*.tgz
