name: CI

on:
  workflow_run:
    workflows: ['Check-in']
    types: [completed]

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun (action)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Install dependencies
        run: bun install

      - name: Run test suite
        run: bun test

      - name: Run sample (smoke)
        run: bun run start
